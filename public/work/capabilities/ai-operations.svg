<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="20" fill="#F0EDE8"/>

  <!-- Ears / side connectors -->
  <rect x="44" y="82" width="18" height="28" rx="6" fill="#A89FEE"/>
  <rect x="138" y="82" width="18" height="28" rx="6" fill="#A89FEE"/>

  <!-- Robot head body -->
  <rect x="62" y="62" width="76" height="70" rx="12" fill="#6B5CE7"/>

  <!-- Eyes (white boxes) -->
  <rect x="76" y="80" width="18" height="16" rx="5" fill="#ffffff"/>
  <rect x="106" y="80" width="18" height="16" rx="5" fill="#ffffff"/>
  <!-- Eye pupils -->
  <circle cx="85" cy="88" r="5" fill="#6B5CE7"/>
  <circle cx="115" cy="88" r="5" fill="#6B5CE7"/>

  <!-- Mouth grille lines -->
  <line x1="78"  y1="110" x2="122" y2="110" stroke="#ffffff" stroke-width="2"   stroke-linecap="round" stroke-opacity="0.75"/>
  <line x1="82"  y1="118" x2="118" y2="118" stroke="#ffffff" stroke-width="2"   stroke-linecap="round" stroke-opacity="0.45"/>
  <line x1="86"  y1="126" x2="114" y2="126" stroke="#ffffff" stroke-width="2"   stroke-linecap="round" stroke-opacity="0.22"/>

  <!-- Neck -->
  <rect x="88" y="132" width="24" height="12" rx="4" fill="#A89FEE"/>

  <!-- Antenna stem -->
  <line x1="100" y1="62" x2="100" y2="46" stroke="#6B5CE7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Antenna top orb -->
  <circle cx="100" cy="42" r="6" fill="#A89FEE"/>

  <!-- Signal arcs (top-right) -->
  <path d="M 132 52 Q 152 65 146 86" fill="none" stroke="#D0CBFF" stroke-width="2" stroke-linecap="round"/>
  <path d="M 140 44 Q 168 62 160 90" fill="none" stroke="#E2DED8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
